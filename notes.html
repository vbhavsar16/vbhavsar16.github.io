<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes | Vivek Bhavsar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site">
    <h1>Notes</h1>
    <p class="lead">Study notes organized by topic. Pick a topic tab, then open a note to read.</p>

    <div class="notes-layout">
      <aside>
        <div class="topic-tabs" id="topics"></div>
        <div class="note-list" id="note-list"></div>
      </aside>
      <article class="note-reader" id="reader">
        <p class="muted">Loading notes…</p>
      </article>
    </div>
  </main>

  <script src="main.js"></script>
  <script src="notes.js"></script>
</body>
</html>
